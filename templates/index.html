<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Generated Detection</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #0f2027, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Arial, sans-serif;
            color: white;
        }

        .card {
            background: linear-gradient(145deg, #0f3c4c, #0a2a35);
            width: 420px;
            padding: 35px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 174, 255, 0.35);
        }

        .card h1 {
            font-size: 20px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #0a2a35;
            border: 1px solid #00bcd4;
            border-radius: 8px;
            color: #bbb;
            cursor: pointer;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #00bcd4, #2196f3);
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            box-shadow: 0 0 12px rgba(33, 150, 243, 0.8);
            transform: translateY(-1px);
        }

        .result {
            margin-top: 25px;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
        }

        .ai {
            background: rgba(255, 60, 60, 0.15);
            border: 1px solid #ff5252;
            color: #ff8a8a;
        }

        .real {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid #4caf50;
            color: #9cff9c;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>AI Generated Video / Image Detection</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Upload & Analyze</button>
    </form>

    {% if result %}
        {% if "AI" in result %}
            <div class="result ai">
                <strong>{{ result }}</strong><br>
                AI Frames: {{ ai_frames }}<br>
                Real Frames: {{ real_frames }}
            </div>
        {% else %}
            <div class="result real">
                <strong>{{ result }}</strong><br>
                AI Frames: {{ ai_frames }}<br>
                Real Frames: {{ real_frames }}
            </div>
        {% endif %}
    {% endif %}
</div>

</body>
</html>
